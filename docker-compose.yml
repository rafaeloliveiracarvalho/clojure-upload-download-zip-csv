services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=files_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  s3:
    image: andrewgaul/s3proxy
    ports:
      - "8001:8001"
    environment:
      - S3PROXY_AUTHORIZATION=none
      - S3PROXY_ENDPOINT=http://0.0.0.0:8001

  front:
    build:
      context: ./front
    ports:
      - "3001:3001"

  api:
    build:
      context: ./api
    ports:
      - "3000:3000"
    environment:
      - S3_ENDPOINT=http://s3:8001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=files_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db
      - s3

volumes:
  postgres_data:

networks:
  default:
    name: clojure_network
